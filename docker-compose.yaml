services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
    ports:
      - "${NEXT_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-default}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-admin}
      QUEUE_SHARDS: ${QUEUE_SHARDS:-16}
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-cjarn/docker-panel-lite-worker:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./repos:/app/clones
      - ./data:/app/data
    environment:
      - FIREBASE_DATABASE_URL
      - NEXT_PUBLIC_FIREBASE_DATABASE_URL
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - FIREBASE_SERVICE_ACCOUNT_JSON
      - CREDENTIAL_ENCRYPTION_KEY
      - WORKER_WORKSPACE_ID
      - WORKER_POOL
      - WORKER_ID
      - WORKER_TOKEN
      - WORKER_MACHINE_ID
      - WORKER_LABEL
      - WORKER_LOCATION
      - WORKER_SHARDS
      - WORKER_MAX_CONCURRENCY
      - WORKER_LEASE_SECONDS
      - WORKER_POLL_SECONDS
      - QUEUE_SHARDS
      - TRAEFIK_ENABLED
      - TRAEFIK_NETWORK
      - NGROK_ENABLED
      - NGROK_AUTHTOKEN
      - NGROK_REGION
      - APP_DATA_DIR
      - APP_CLONE_DIR
    restart: unless-stopped

  traefik:
    image: traefik:v3.3
    profiles:
      - traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/letsencrypt:/letsencrypt
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    name: ${TRAEFIK_NETWORK:-proxy}
