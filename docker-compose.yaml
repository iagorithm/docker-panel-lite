services:
  logs-agent:
    build:
      context: .
      dockerfile: services/logs-agent/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CREWAI_MODEL: ${CREWAI_MODEL:-openai/gpt-5-mini}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      GITHUB_BASE_BRANCH: ${GITHUB_BASE_BRANCH:-main}
      LOGS_AGENT_SECRET: ${LOGS_AGENT_SECRET:-}
      LOGS_AGENT_MAX_CONCURRENCY: ${LOGS_AGENT_MAX_CONCURRENCY:-2}
      LOGS_AGENT_PREVIEW_TTL_SECONDS: ${LOGS_AGENT_PREVIEW_TTL_SECONDS:-3600}
      LOGS_AGENT_MAX_CHANGED_FILES: ${LOGS_AGENT_MAX_CHANGED_FILES:-3}
      LOGS_AGENT_MAX_PAYLOAD_BYTES: ${LOGS_AGENT_MAX_PAYLOAD_BYTES:-250000}
      LOGS_AGENT_LLM_TIMEOUT_SECONDS: ${LOGS_AGENT_LLM_TIMEOUT_SECONDS:-180}
      LOGS_AGENT_LLM_RETRIES: ${LOGS_AGENT_LLM_RETRIES:-2}
      LOGS_AGENT_MAX_ITERATIONS: ${LOGS_AGENT_MAX_ITERATIONS:-12}
      LOGS_AGENT_EXECUTION_TIMEOUT_SECONDS: ${LOGS_AGENT_EXECUTION_TIMEOUT_SECONDS:-240}
      LOGS_AGENT_DATABASE_PATH: ${LOGS_AGENT_DATABASE_PATH:-/data/logs-agent.db}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    volumes:
      - logs-agent-data:/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  logs:
    build:
      context: .
      dockerfile: apps/logs/Dockerfile
      args:
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
    ports:
      - "${LOGS_PORT:-3001}:3001"
    environment:
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}}
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-default}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-admin}
      LOGS_AGENT_URL: ${LOGS_AGENT_URL:-http://logs-agent:8000}
      LOGS_AGENT_SECRET: ${LOGS_AGENT_SECRET:-}
    depends_on:
      - logs-agent
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
        NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
        NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
    ports:
      - "${NEXT_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-}
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID:-}
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      DEFAULT_WORKSPACE_ID: ${DEFAULT_WORKSPACE_ID:-default}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-admin}
      QUEUE_SHARDS: ${QUEUE_SHARDS:-16}
    restart: unless-stopped

  worker:
    image: ${WORKER_IMAGE:-cjarn/docker-panel-lite-worker:py}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volume/repos/worker-py:/app/clones
      - ./volume/data/worker-py:/app/data
    environment:
      - FIREBASE_DATABASE_URL
      - NEXT_PUBLIC_FIREBASE_DATABASE_URL
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID
      - FIREBASE_SERVICE_ACCOUNT_JSON
      - CREDENTIAL_ENCRYPTION_KEY
      - WORKER_WORKSPACE_ID
      - WORKER_POOL
      - WORKER_ID
      - WORKER_TOKEN
      - WORKER_MACHINE_ID
      - WORKER_LABEL
      - WORKER_LOCATION
      - WORKER_SHARDS
      - WORKER_MAX_CONCURRENCY
      - WORKER_LEASE_SECONDS
      - WORKER_POLL_SECONDS
      - QUEUE_SHARDS
      - NGROK_ENABLED
      - NGROK_AUTHTOKEN
      - NGROK_REGION
      - APP_DATA_DIR
      - APP_CLONE_DIR
    restart: unless-stopped

  worker-go:
    profiles:
      - go-worker
    image: ${WORKER_GO_IMAGE:-cjarn/docker-panel-lite-worker:go}
    build:
      context: .
      dockerfile: services/worker-go/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volume/repos/worker-go:/app/clones
      - ./volume/data/worker-go:/app/data
    environment:
      FIREBASE_DATABASE_URL: ${FIREBASE_DATABASE_URL:-}
      NEXT_PUBLIC_FIREBASE_DATABASE_URL: ${NEXT_PUBLIC_FIREBASE_DATABASE_URL:-}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      WORKER_WORKSPACE_ID: ${WORKER_WORKSPACE_ID:-default}
      WORKER_POOL: ${WORKER_GO_POOL:-go-local}
      WORKER_ID: ${WORKER_GO_ID:-}
      WORKER_TOKEN: ${WORKER_GO_TOKEN:-}
      WORKER_MACHINE_ID: ${WORKER_GO_MACHINE_ID:-}
      WORKER_LABEL: ${WORKER_GO_LABEL:-}
      WORKER_LOCATION: ${WORKER_GO_LOCATION:-}
      WORKER_SHARDS: ${WORKER_GO_SHARDS:-${WORKER_SHARDS:-}}
      WORKER_MAX_CONCURRENCY: ${WORKER_GO_MAX_CONCURRENCY:-${WORKER_MAX_CONCURRENCY:-2}}
      WORKER_LEASE_SECONDS: ${WORKER_GO_LEASE_SECONDS:-${WORKER_LEASE_SECONDS:-90}}
      WORKER_POLL_SECONDS: ${WORKER_GO_POLL_SECONDS:-${WORKER_POLL_SECONDS:-5}}
      QUEUE_SHARDS: ${QUEUE_SHARDS:-16}
      NGROK_ENABLED: ${NGROK_GO_ENABLED:-${NGROK_ENABLED:-}}
      NGROK_AUTHTOKEN: ${NGROK_GO_AUTHTOKEN:-${NGROK_AUTHTOKEN:-}}
      NGROK_REGION: ${NGROK_GO_REGION:-${NGROK_REGION:-}}
      APP_DATA_DIR: /app/data
      APP_CLONE_DIR: /app/clones
    restart: unless-stopped

volumes:
  logs-agent-data:
