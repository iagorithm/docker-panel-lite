services:
  worker:
    image: ${WORKER_IMAGE:-cjarn/docker-panel-lite-worker:latest}
    build:
      context: .
      dockerfile: services/worker/Dockerfile
  worker-go:
    image: ${WORKER_GO_IMAGE:-cjarn/docker-panel-lite-worker:go}
    build:
      context: .
      dockerfile: services/worker-go/Dockerfile
      args:
        WORKER_CONFIG_REQUIRED: "true"
      secrets:
        - worker_config
  worker-rust:
    image: ${WORKER_RUST_IMAGE:-cjarn/docker-panel-lite-worker:rust}
    build:
      context: .
      dockerfile: services/worker-rust/Dockerfile
      args:
        WORKER_CONFIG_REQUIRED: "true"
      secrets:
        - worker_config

secrets:
  worker_config:
    file: .env
